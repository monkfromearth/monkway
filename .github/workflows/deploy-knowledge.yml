name: Deploy Site

# Builds the knowledge/ Astro site (landing + course) and deploys it to GitHub Pages.

on:
  push:
    branches: [main]
    paths:
      - 'knowledge/**'
      - '.github/workflows/deploy-knowledge.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: knowledge
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: knowledge
        run: bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: knowledge/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
